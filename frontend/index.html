<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка возраста</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f4f9; 
            margin: 0;
        }
        .card { 
            background-color: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 300px;
        }
        input { 
            padding: 10px; 
            margin-bottom: 15px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button { 
            padding: 10px 20px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%;
            font-size: 16px;
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #result { 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 18px;
        }
        .allowed { color: #28a745; }
        .denied { color: #dc3545; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Проверка возраста</h2>
        <input type="number" id="ageInput" placeholder="Введите ваш возраст" required min="0">
        <button id="checkButton">Проверить возраст</button>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('checkButton').addEventListener('click', async () => {
            const age = document.getElementById('ageInput').value;
            const resultDiv = document.getElementById('result');

            if (age === "") {
                resultDiv.textContent = "Пожалуйста, введите возраст.";
                resultDiv.className = "denied";
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/check-age', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ age: parseInt(age, 10) })
                });

                if (!response.ok) {
                    throw new Error('Ошибка сервера');
                }

                const data = await response.json();
                
                resultDiv.textContent = data.message;
                if (data.allowed) {
                    resultDiv.className = "allowed";
                } else {
                    resultDiv.className = "denied";
                }
            } catch (error) {
                console.error(error);
                resultDiv.textContent = "Сбой соединения с сервером.";
                resultDiv.className = "denied";
            }
        });
    </script>
</body>
</html>
